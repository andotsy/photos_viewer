          ${item.latitude && item.longitude ? `<span>${item.latitude.toFixed(4)}, ${item.longitude.toFixed(4)}</span>` : ''}
        </div>
      `;

      // Prefetch more items if approaching end of loaded list
      if (hasMore && !loading && currentLbIndex >= items.length - 10) {
        loadItems();
      }
    }

    // --- Touch: pinch-to-zoom + pan + swipe nav ---
    let lastPinchDist = 0;     // previous frame's finger distance (frame-by-frame delta)
    let lastTouchCenter = null;
    let touchPanning = false;
    let touchSwiping = false;
    let touchSwipeLocked = false;
    let dragDismissing = false; // drag-down-to-close active
    let dragDismissY = 0;      // current vertical drag offset

    lbContent.addEventListener('touchstart', (e) => {
      const media = getMediaEl();
      if (!media) return;
      const img = getZoomImg(); // null if video

      if (e.touches.length === 2 && img) {
        // Pinch-to-zoom: photos only
        e.preventDefault();
        touchSwiping = false;
        cancelAnimationFrame(zoomRaf);
        zoomRaf = 0;
        pinchStartDist = getTouchDist(e.touches);
        lastPinchDist = pinchStartDist;
        lastTouchCenter = getTouchCenter(e.touches);
      } else if (e.touches.length === 1) {
        // Always record touch start position for tap detection
        swipeStartX = e.touches[0].clientX;
        swipeStartY = e.touches[0].clientY;
        if (img && zoomLevel > 1.001) {
          // Panning: photos only when zoomed
          e.preventDefault();
          cancelAnimationFrame(zoomRaf);
          zoomRaf = 0;
          touchPanning = true;
          panStartX = e.touches[0].clientX;
          panStartY = e.touches[0].clientY;
          panStartPanX = panX;
          panStartPanY = panY;
          // Swap to preview once at pan start for performance
          swapToPreview();
          clearTimeout(interactionTimer);
        } else {
          // Start potential swipe (photos at zoom=1 + all videos)
          touchSwiping = true;
          touchSwipeLocked = false;
          swipeDragX = 0;
        }
      }
    }, { passive: false });

    lbContent.addEventListener('touchmove', (e) => {
      const media = getMediaEl();
      if (!media) return;
      const img = getZoomImg(); // null if video

      if (e.touches.length === 2 && img) {
        // Pinch-to-zoom: photos only
        e.preventDefault();
        // Swap to preview during pinch for performance
        swapToPreview();
        scheduleFullResSwap();
        const dist = getTouchDist(e.touches);
        const center = getTouchCenter(e.touches);

        // Frame-by-frame scale: compare to previous frame, not gesture start
        // Handles finger re-grips naturally, no accumulated drift
        const scale = lastPinchDist > 0 ? dist / lastPinchDist : 1;
        const newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoomLevel * scale));

        const { fitW, fitH, cw, ch } = getFitDims(img);
        const rect = lbContent.getBoundingClientRect();
        const mx = center.x - rect.left;
        const my = center.y - rect.top;

        const panDeltaX = lastTouchCenter ? center.x - lastTouchCenter.x : 0;
        const panDeltaY = lastTouchCenter ? center.y - lastTouchCenter.y : 0;

        let fromPX = panX, fromPY = panY;
        if (zoomLevel <= 1.001) {
          const c = centeredPan(fitW, fitH, cw, ch, 1);
          fromPX = c.x;
          fromPY = c.y;
        }
        const imgX = (mx - panDeltaX - fromPX) / zoomLevel;
        const imgY = (my - panDeltaY - fromPY) / zoomLevel;
        const newPX = mx - imgX * newZoom;
        const newPY = my - imgY * newZoom;
        const clamped = clampPan(newPX, newPY, fitW, fitH, cw, ch, newZoom);

        zoomLevel = newZoom;
        panX = clamped.x;
        panY = clamped.y;
        targetZoom = zoomLevel;
        targetPanX = panX;
        targetPanY = panY;
        renderZoom();

        lastPinchDist = dist;
        lastTouchCenter = center;
      } else if (e.touches.length === 1 && touchSwiping) {
        const dx = e.touches[0].clientX - swipeStartX;
        const dy = e.touches[0].clientY - swipeStartY;
        if (!touchSwipeLocked && !dragDismissing) {
          if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
            if (Math.abs(dx) >= Math.abs(dy)) {
              touchSwipeLocked = true;
              e.preventDefault();
            } else {
              // Vertical drag — enter drag-to-dismiss mode
              touchSwiping = false;
              dragDismissing = true;
              // Hide all UI
              setControlsVisible(false);
              e.preventDefault();
              return;
            }
          } else {
            return;
          }
        }
        e.preventDefault();
        swipeDragX = dx;
        // Rubber band at boundaries
        const cw = lbContent.clientWidth;
        if (swipeDragX > 0 && currentLbIndex === 0) swipeDragX = swipeDragX * 0.2;
        if (swipeDragX < 0 && currentLbIndex >= items.length - 1) swipeDragX = swipeDragX * 0.2;
        const basePct = -33.3333;
        const offsetPct = (swipeDragX / cw) * 33.3333;
        swipeTrack.style.transition = 'none';
        swipeTrack.style.transform = `translateX(${basePct + offsetPct}%)`;
      } else if (e.touches.length === 1 && dragDismissing) {
        e.preventDefault();
        dragDismissY = e.touches[0].clientY - swipeStartY;
        // Only allow dragging down (positive Y), rubber band upward
        if (dragDismissY < 0) dragDismissY = dragDismissY * 0.15;
        const progress = Math.min(Math.abs(dragDismissY) / (window.innerHeight * 0.35), 1);
        lbContent.style.transition = 'none';
        lbContent.style.transform = `translateY(${dragDismissY}px)`;
        lightbox.style.transition = 'none';
        lightbox.style.background = `rgba(0,0,0,${1 - progress * 0.6})`;
      } else if (e.touches.length === 1 && touchPanning && img && zoomLevel > 1.001) {
        e.preventDefault();
        const { fitW, fitH, cw, ch } = getFitDims(img);
        const rawX = panStartPanX + (e.touches[0].clientX - panStartX);
        const rawY = panStartPanY + (e.touches[0].clientY - panStartY);
        const clamped = clampPan(rawX, rawY, fitW, fitH, cw, ch, zoomLevel);
        panX = clamped.x;
        panY = clamped.y;
        targetPanX = panX;
        targetPanY = panY;
        renderPan();
      }
    }, { passive: false });

    lbContent.addEventListener('touchend', (e) => {
      if (dragDismissing && e.touches.length === 0) {
        dragDismissing = false;
        if (dragDismissY > window.innerHeight * 0.2) {
          // Dismiss — animate lbContent off screen, fade lightbox background
          lbContent.style.transition = 'transform 0.2s ease-out';
          lbContent.style.transform = `translateY(${window.innerHeight}px)`;
          lightbox.style.transition = 'background 0.2s ease-out';
          lightbox.style.background = 'rgba(0,0,0,0)';
          setTimeout(() => {
            closeLightbox();
            lbContent.style.transition = '';
            lbContent.style.transform = '';
            lightbox.style.transition = '';
            lightbox.style.background = '';
          }, 200);
        } else {
          // Snap back — animate lbContent back to origin, restore background
          lbContent.style.transition = 'transform 0.25s ease-out';
          lbContent.style.transform = '';
          lightbox.style.transition = 'background 0.25s ease-out';
          lightbox.style.background = '';
          // Restore UI elements (unless in immersive mode or zoomed)
          if (!controlsHidden && zoomLevel <= 1.001) {
            setControlsVisible(true);
          }
          setTimeout(() => {
            lbContent.style.transition = '';
            lightbox.style.transition = '';
          }, 250);
        }
        dragDismissY = 0;
        return;
      }
      if (touchSwiping && e.touches.length === 0) {
        finishSwipe(swipeDragX);
        touchSwiping = false;
        touchSwipeLocked = false;
        swipeDragX = 0;
      }
      if (e.touches.length < 2) {
        pinchStartDist = 0;
        lastPinchDist = 0;
        lastTouchCenter = null;
        if (zoomLevel < 1) {
          animateResetZoom();
        }
      }
      if (e.touches.length === 0) {
        if (touchPanning) {
          // Swap back to full-res after touch pan ends
          scheduleFullResSwap();
        }
        touchPanning = false;
      }
    });

    function getTouchDist(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    function getTouchCenter(touches) {
      return {
        x: (touches[0].clientX + touches[1].clientX) / 2,
        y: (touches[0].clientY + touches[1].clientY) / 2,
      };
    }

    function showLightboxItem(index) {
      const item = items[index];
      if (!item) return;

      // Invalidate all in-flight loads from previous navigation
      loadGeneration++;

      // Abort any in-flight full-res download
      abortFullRes();
      clearTimeout(fullResDelayTimer);
      fullResDelayTimer = null;
      // Clear any pending wheel swipe
      clearTimeout(wheelSwipeSettleTimer);
      wheelSwipeAccum = 0;

      rotation = 0;
      fullResSrc = null;
      previewSrc = null;
      clearTimeout(interactionTimer);
      clearTimeout(singleTapTimer);
      resetZoom();
      wasZoomedState = false; // ensure clean state after reset (safety net)
      // Reset swipe track position
      swipeTrack.style.transition = '';
      swipeTrack.style.transform = 'translateX(-33.3333%)';

      lbQuality.innerHTML = '';

      if (item.isVideo) {
        slideCurrent.innerHTML = '';
        slidePrev.innerHTML = '';
        slideNext.innerHTML = '';
        const { wrapper, video } = createVideoEl(item.id);
        video.onerror = () => {
          slideCurrent.innerHTML = '<p style="color:#fff">Error loading video</p>';
        };
        slideCurrent.appendChild(wrapper);
      } else {
        // Check if we already have a cached full-res blob for this item
        const cachedUrl = fullResCache.get(item.id);
        if (cachedUrl) {
          // Serve from cache — instant full quality
          const img = new Image();
          img.draggable = false;
          img.src = cachedUrl;
          fullResSrc = cachedUrl;
          slideCurrent.innerHTML = '';
          slideCurrent.appendChild(img);
          showQuality('full');
          fullResCacheTouch(item.id);
        } else {
          // Progressive: preview first, then full-res
          loadProgressive(item);
        }
      }

      // Populate adjacent slides for swipe
      preloadAdjacentPreviews();

      // Info bar
      const date = item.dateCreated ? new Date(item.dateCreated).toLocaleString() : '';
      const dims = item.width && item.height ? `${item.width} × ${item.height}` : '';
      const camera = '';
      const fname = item.originalFilename || item.filename || '';

      lbInfo.innerHTML = `
        <div class="filename">${fname}</div>
        <div class="meta">
          ${date ? `<span>${date}</span>` : ''}
          ${dims ? `<span>${dims}</span>` : ''}
          ${camera ? `<span>${camera}</span>` : ''}
          ${item.latitude && item.longitude ? `<span>${item.latitude.toFixed(4)}, ${item.longitude.toFixed(4)}</span>` : ''}
        </div>
      `;

      // Prefetch more items if approaching end of loaded list
      if (hasMore && !loading && currentLbIndex >= items.length - 10) {
        loadItems();
      }
    }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbRotate').addEventListener('click', () => {
      if (currentLbIndex < 0) return;
      rotateLeft();
    });
    document.getElementById('lbDownload').addEventListener('click', () => {
      if (currentLbIndex < 0) return;
      const item = items[currentLbIndex];
      if (!item) return;
      const a = document.createElement('a');
      a.href = `/api/download/${item.id}`;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      a.remove();
    });
    document.getElementById('lbPrev').addEventListener('click', () => {
      if (currentLbIndex > 0) {
        currentLbIndex--;
        showLightboxItem(currentLbIndex);
      }
    });
    document.getElementById('lbNext').addEventListener('click', () => {
      if (currentLbIndex < items.length - 1) {
        currentLbIndex++;
        showLightboxItem(currentLbIndex);
      }
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') {
        closeLightbox();
      }
      // Only navigate when not zoomed
      if (zoomLevel <= 1.001 && targetZoom <= 1.001) {
        if (e.key === 'ArrowLeft' && currentLbIndex > 0) {
          currentLbIndex--;
          showLightboxItem(currentLbIndex);
        }
        if (e.key === 'ArrowRight' && currentLbIndex < items.length - 1) {
          currentLbIndex++;
          showLightboxItem(currentLbIndex);
        }
      }
      // Zoom with +/- keys
      if (e.key === '=' || e.key === '+') {
        zoomCenter(targetZoom * 1.5);
      }
      if (e.key === '-' || e.key === '_') {
        zoomCenter(targetZoom / 1.5);
      }
      if (e.key === '0') {
        animateResetZoom();
      }
      if (e.key === 'r' || e.key === 'R') {
        rotateLeft();
      }
    });

    // Click outside photo to close (but not after a swipe)
    let lastSwipeTime = 0;
    lightbox.addEventListener('click', (e) => {
      // Don't close if this click came right after a swipe
      if (Date.now() - lastSwipeTime < 300) return;
      const tag = e.target.tagName;
      // Don't close if clicked on a button, or inside the content area
      if (tag === 'BUTTON' || e.target.closest('button')) return;
      if (tag === 'VIDEO') return;
      // Click on the image itself = toggle immersive mode (desktop)
      if (tag === 'IMG' && e.target.closest('.lightbox-content')) {
        toggleImmersive();
        return;
      }
      if (e.target.closest('.lightbox-content')) return;
      closeLightbox();
    });

    // --- Helpers ---
    function formatDateGroup(date) {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const diff = Math.floor((today - d) / 86400000);

      if (diff === 0) return 'Today';
      if (diff === 1) return 'Yesterday';
      if (diff < 7) return date.toLocaleDateString('en-US', { weekday: 'long' });

      return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function formatDuration(seconds) {
      if (!seconds) return '';
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }
  </script>
</body>
</html>
